name: Build Big Brain AI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_TOKEN:   ${{ secrets.MEMORY_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            ccache lld \
            openjdk-17-jdk

      - name: Accept Android SDK licenses and install components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "ndk;25.2.9519653" || true

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Create app directory and copy source files
        run: |
          mkdir -p bigbrain
          cp kernel.py      bigbrain/kernel.py
          cp main.py        bigbrain/main.py
          cp buildozer.spec bigbrain/buildozer.spec

      - name: Build APK
        run: |
          cd bigbrain
          buildozer android debug 2>&1

      - name: Locate APK
        run: |
          APK=$(find bigbrain/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found in bin — searching entire workspace:"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          cp "$APK" BigBrainAI.apk
          echo "APK ready: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BigBrainAI
          path: BigBrainAI.apk
          retention-days: 30
